name: clip_sync
description: "ClipSync — a decentralized, E2EE clipboard sync tool."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: ^0.12.1
  mqtt_client: ^10.3.1
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.2
  cryptography: ^2.7.0
  provider: ^6.1.1
  uuid: ^4.3.3
  sqflite_common_ffi_web: ^1.1.1
  system_tray: ^0.1.1
  window_manager: ^0.5.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  permission_handler: ^12.0.1
  hotkey_manager: ^0.2.3
  sqflite_common_ffi: ^2.4.0+2
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/gifs/
    - assets/logo.png
    - assets/logo clipsync bg.png
    - assets/logo clipsync no bg.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo clipsync bg.png"
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "assets/logo clipsync bg.png"
    icon_size: 256
